<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>CCODE-11 — map tier preview</title>
<link rel="stylesheet" href="../style.css">
<style>
  body { padding: 16px; font-family: var(--font-ui, system-ui); }
  h3 { color: var(--accent, #c9a227); margin: 18px 0 4px; font-size: 15px; }
  .hint { font-size: 12px; opacity: .7; margin-bottom: 6px; }
  .graph-wrap { border: 1px solid var(--border, #333); border-radius: 8px; margin-bottom: 10px; }
</style></head>
<body>
<!-- CCODE-11 preview harness. Renders the THREE TIERS through the real engine functions against the
     real content packs, so the readability change can be SEEN rather than asserted. Not part of the
     app; a dev aid for exactly the question Erik asked ("readable levels"). -->
<div id="out">loading…</div>
<script type="module">
import { autoMapPositions, worldTierNodes, regionTierNodes, locationTierNodes, interiorLayout, iconForTags, terrainClass } from "../engine/worldmap.js";

const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const j = p => fetch(p).then(r => r.json());

const coreMan = await j("../content/packs/core/manifest.json");
const valMan = await j("../content/packs/valley/manifest.json");
const locations = {};
for (const rel of valMan.provides.locations) { const l = await j("../content/packs/valley/" + rel); locations[l.id] = l; }
const regionsFile = (coreMan.provides.rules || []).find(r => r.includes("regions"));
const regions = (await j("../content/packs/core/" + regionsFile)).regions || [];
const character = await j("../characters/player-s9z9u1/char-mrhs8286.json");
const CONTENT = { locations, regions };

const out = [];

// ---- WORLD ----
const world = worldTierNodes(CONTENT, character);
const cols = 5, cw = 800 / cols, ch = 96, rows = Math.ceil(world.length / cols);
out.push(`<h3>WORLD — ${world.length} regions, ${world.reduce((n, r) => n + r.gates.length, 0)} waygates</h3>
<div class="hint">The scale where the question is "which Reach am I in". No settlements — they're noise here.</div>
<div class="graph-wrap"><svg viewBox="0 0 800 ${rows * ch + 30}" class="world-map">` +
world.map((n, i) => {
  const cx = (i % cols) * cw + cw / 2, cy = Math.floor(i / cols) * ch + 58, pal = n.palette || {};
  const hub = n.gates.find(g => g.hub);
  return `<g class="map-region-cell">
    <rect x="${cx - cw / 2 + 8}" y="${cy - 34}" width="${cw - 16}" height="72" rx="10" fill="${esc(pal.base || "#242a24")}" stroke="${esc(n.here ? (pal.accent || "#c9a227") : (pal.edge || "#333"))}" stroke-width="${n.here ? 2.5 : 1}"/>
    <text x="${cx}" y="${cy - 8}" text-anchor="middle" class="map-label" fill="${esc(pal.accent || "#9a9")}">${esc(n.name)}</text>
    <text x="${cx}" y="${cy + 10}" text-anchor="middle" class="map-visits">${n.count} place${n.count === 1 ? "" : "s"}</text>
    ${n.gates.length ? `<text x="${cx}" y="${cy + 26}" text-anchor="middle" class="map-visits">◈ ${hub ? "hub" : n.gates.length + " gate" + (n.gates.length === 1 ? "" : "s")}</text>` : ""}
  </g>`;
}).join("") + `</svg></div>`);

// ---- REGION (the one Silas is in) ----
const rid = locations[character.currentLocationId]?.regionId || "the_center";
const reg = regionTierNodes(CONTENT, character, rid);
const pos = autoMapPositions(reg.locations);
out.push(`<h3>REGION — ${esc(regions.find(r => r.regionId === rid)?.name || rid)}: ${reg.locations.length} places</h3>
<div class="hint">Today's map, finally scoped. Previously all 95 places rendered at once on this same canvas.</div>
<div class="graph-wrap"><svg viewBox="0 0 800 440" class="world-map">` +
reg.edges.map(([a, b]) => `<line x1="${pos[a].x}" y1="${pos[a].y}" x2="${pos[b].x}" y2="${pos[b].y}" class="map-edge"/>`).join("") +
reg.locations.map((l, li) => { const P = pos[l.id]; const here = l.id === character.currentLocationId;
  return `<g class="map-node ${terrainClass(l)} ${here ? "here" : ""}">
    <circle cx="${P.x}" cy="${P.y}" r="${here ? 14 : 10}"/>
    <text x="${P.x}" y="${P.y + 5}" text-anchor="middle" class="map-icon">${iconForTags(l.tags)}</text>
    <text x="${P.x}" y="${P.y - 20}" text-anchor="middle" class="map-label">${esc(l.name)}</text>
  </g>`; }).join("") + `</svg></div>`);

// ---- LOCATION (the interior tier that never existed) ----
for (const target of ["millbrook", "radiant_plateau_edge"]) {
  const { host, children } = locationTierNodes(character, CONTENT, target);
  const laid = interiorLayout(children);
  out.push(`<h3>LOCATION — inside ${esc(host?.name || target)}: ${children.length} places within</h3>
  <div class="hint">The tier that did not exist. A ringed node grew into a place of its own but still sits inside its container.</div>
  <div class="graph-wrap"><svg viewBox="0 0 800 460" class="world-map">
    <circle cx="400" cy="230" r="34" class="map-node here"/>
    <text x="400" y="235" text-anchor="middle" class="map-icon">${iconForTags(host?.tags || [])}</text>
    <text x="400" y="286" text-anchor="middle" class="map-label">${esc(host?.name || target)}</text>` +
    laid.map(c => `<line x1="400" y1="230" x2="${c.x.toFixed(1)}" y2="${c.y.toFixed(1)}" class="map-edge"/>`).join("") +
    laid.map((c, i) => `<g class="map-node ${c.visited ? "" : "unvisited"} ${c.promoted ? "reachable" : ""}">
      <circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${c.promoted ? 11 : 8}"/>
      <text x="${c.x.toFixed(1)}" y="${(c.y + (c.y > 230 ? 26 + (i % 2) * 14 : -14 - (i % 2) * 14)).toFixed(1)}" text-anchor="middle" class="map-label">${esc(c.name.length > 20 ? c.name.slice(0, 19) + "…" : c.name)}</text>
    </g>`).join("") + `</svg></div>`);
}

document.getElementById("out").innerHTML = out.join("");
</script></body></html>
